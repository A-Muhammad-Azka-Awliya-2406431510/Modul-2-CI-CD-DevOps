<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Created</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Payment Created</h2>
    <p class="text-muted">Your payment request has been recorded.</p>

    <div class="card mb-4">
        <div class="card-body">
            <p class="mb-2">
                <strong>Order ID:</strong>
                <span th:text="${orderId}">-</span>
            </p>
            <p class="mb-0">
                <strong>Payment ID:</strong>
                <span id="paymentIdText" th:text="${paymentId}">-</span>
            </p>
        </div>
    </div>

    <a class="btn btn-primary"
       th:if="${paymentId != null}"
       th:href="@{/payment/detail/{paymentId}(paymentId=${paymentId})}">
        Open Payment Detail
    </a>
    <a th:href="@{/order/history}" class="btn btn-secondary">Back to Order History</a>
</div>
</body>
</html>
