<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Payment List</h2>
    <a th:href="@{/payment/detail}" class="btn btn-secondary mb-3">Search Payment by ID</a>

    <table class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th>Payment ID</th>
            <th>Method</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${payments == null or #lists.isEmpty(payments)}">
            <td colspan="4" class="text-center text-muted">No payments found</td>
        </tr>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.method}"></td>
            <td th:text="${payment.status}"></td>
            <td>
                <a class="btn btn-info btn-sm"
                   th:href="@{/payment/detail/{paymentId}(paymentId=${payment.id})}">
                    User Detail
                </a>
                <a class="btn btn-primary btn-sm"
                   th:href="@{/payment/admin/detail/{paymentId}(paymentId=${payment.id})}">
                    Admin Detail
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
