<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Payment Detail</h2>

    <div class="alert alert-warning" th:if="${payment == null}">
        Payment data is not found.
    </div>

    <table class="table table-striped table-responsive-md" th:if="${payment != null}">
        <tbody>
        <tr>
            <th>Payment ID</th>
            <td th:text="${payment.id}"></td>
        </tr>
        <tr>
            <th>Method</th>
            <td th:text="${payment.method}"></td>
        </tr>
        <tr>
            <th>Status</th>
            <td id="paymentStatus" th:text="${payment.status}"></td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/payment/detail}" class="btn btn-secondary">Back</a>
    <a class="btn btn-info"
       th:if="${payment != null}"
       th:href="@{/payment/admin/detail/{paymentId}(paymentId=${payment.id})}">
        Open Admin Detail
    </a>
</div>
</body>
</html>
