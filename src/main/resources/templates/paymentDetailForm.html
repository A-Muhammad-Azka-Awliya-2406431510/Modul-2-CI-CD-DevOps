<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Payment Detail</h2>
    <p class="text-muted">Input payment id to see payment detail.</p>

    <form method="get" onsubmit="event.preventDefault();window.location='/payment/detail/'+document.getElementById('paymentIdInput').value;">
        <div class="form-group">
            <label for="paymentIdInput">Payment ID</label>
            <input id="paymentIdInput"
                   name="paymentId"
                   type="text"
                   class="form-control col-md-6"
                   placeholder="Enter payment id"
                   required>
        </div>
        <button type="submit" class="btn btn-primary">Show Detail</button>
    </form>
</div>
</body>
</html>
