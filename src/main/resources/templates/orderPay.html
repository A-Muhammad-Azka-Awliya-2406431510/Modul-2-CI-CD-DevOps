<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h2>Pay Order</h2>
    <p class="text-muted">Choose your payment method to complete this order.</p>

    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Order Information</h5>
            <p class="mb-1">
                <strong>Order ID:</strong>
                <span id="orderIdText" th:text="${orderId}">-</span>
            </p>
            <p class="mb-0" th:if="${order != null}">
                <strong>Author:</strong>
                <span th:text="${order.author}">-</span>
            </p>
        </div>
    </div>

    <form th:action="@{/order/pay/{orderId}(orderId=${orderId})}" method="post">
        <div class="form-group">
            <label for="paymentMethod">Payment Method</label>
            <select id="paymentMethod" name="method" class="form-control col-md-6" required>
                <option value="">Choose method</option>
                <option value="VOUCHER_CODE">Voucher Code</option>
                <option value="BANK_TRANSFER">Bank Transfer</option>
                <option value="CASH_ON_DELIVERY">Cash on Delivery</option>
            </select>
        </div>

        <h5 class="mt-4">Voucher Data</h5>
        <div class="form-group">
            <label for="voucherCodeInput">Voucher Code</label>
            <input id="voucherCodeInput"
                   name="voucherCode"
                   type="text"
                   class="form-control col-md-6"
                   placeholder="ESHOP1234ABC5678">
        </div>

        <h5 class="mt-4">Bank Transfer Data</h5>
        <div class="form-group">
            <label for="bankNameInput">Bank Name</label>
            <input id="bankNameInput"
                   name="bankName"
                   type="text"
                   class="form-control col-md-6"
                   placeholder="BCA">
        </div>
        <div class="form-group">
            <label for="referenceCodeInput">Reference Code</label>
            <input id="referenceCodeInput"
                   name="referenceCode"
                   type="text"
                   class="form-control col-md-6"
                   placeholder="VA-123456">
        </div>

        <h5 class="mt-4">Cash on Delivery Data</h5>
        <div class="form-group">
            <label for="addressInput">Address</label>
            <input id="addressInput"
                   name="address"
                   type="text"
                   class="form-control col-md-6"
                   placeholder="Delivery address">
        </div>
        <div class="form-group">
            <label for="deliveryFeeInput">Delivery Fee</label>
            <input id="deliveryFeeInput"
                   name="deliveryFee"
                   type="text"
                   class="form-control col-md-6"
                   placeholder="10000">
        </div>

        <button id="payOrderButton" type="submit" class="btn btn-primary">Submit Payment</button>
        <a th:href="@{/order/history}" class="btn btn-secondary">Back to History</a>
    </form>
</div>
</body>
</html>
